version: 0.2
phases:
  install:
    commands:
      - echo "Installing depencies..."
      - pip3 install -r requirements.txt
 
  build:
    commands:
      - echo "Build started on 'date'"
      - python3 -m py_compile app.py
      - echo "compiling and packing the code"
      - echo "Build completed on 'date'"
 
artifacts:
  files:
    - '**/*'
  exclude-paths:
    - '.git/**/*'
    - '.gitignore'
    - '__pycache__/**/*'
 
